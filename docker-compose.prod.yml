services:
  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database - Production Configuration
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: supplymind-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supplymind_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-supplymind_prod}
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supplymind_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - supplymind_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Redis Cache - Production Configuration
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: supplymind-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - supplymind_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  # ─────────────────────────────────────────────────────────────────────────
  # Backend API - Production Configuration
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE is required}
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: supplymind-backend-prod
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
      - AUTHORIZED_EMAILS=${AUTHORIZED_EMAILS:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-deepseek/deepseek-v4-flash:free}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - STORAGE_PATH=/app/data/storage
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data/storage
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - supplymind_net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend - Production Configuration
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE is required}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=/api/v1
    container_name: supplymind-frontend-prod
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - supplymind_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────────────────────────────────
  # Default Celery Worker - Production Configuration
  # ─────────────────────────────────────────────────────────────────────────
  celery-worker:
    image: ${WORKER_IMAGE:-supplymind-worker:latest}
    container_name: supplymind-celery-worker-prod
    restart: unless-stopped
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: ["celery", "-A", "worker.celery_app", "worker", "-Q", "default", "--loglevel=info", "--concurrency=4"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=supplymind-celery-worker
      - ML_MODEL_PATH=${ML_MODEL_PATH:-/app/data/models}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - app_data:/app/data/storage
      - reports_data:/app/reports
      - models_data:/app/models
    networks:
      - supplymind_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ─────────────────────────────────────────────────────────────────────────
  # ML Worker - Production Configuration (Queue: ml)
  # ─────────────────────────────────────────────────────────────────────────
  ml-worker:
    image: ${WORKER_IMAGE:-supplymind-worker:latest}
    container_name: supplymind-ml-worker-prod
    restart: unless-stopped
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: ["celery", "-A", "worker.celery_app", "worker", "-Q", "ml", "--loglevel=info", "--concurrency=2"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=supplymind-ml-worker
      - ML_MODEL_PATH=${ML_MODEL_PATH:-/app/data/models}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - app_data:/app/data/storage
      - models_data:/app/models
    networks:
      - supplymind_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ─────────────────────────────────────────────────────────────────────────
  # RAG Worker - Production Configuration (Queue: rag)
  # ─────────────────────────────────────────────────────────────────────────
  rag-worker:
    image: ${WORKER_IMAGE:-supplymind-worker:latest}
    container_name: supplymind-rag-worker-prod
    restart: unless-stopped
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: ["celery", "-A", "worker.celery_app", "worker", "-Q", "rag", "--loglevel=info", "--concurrency=1"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=supplymind-rag-worker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - app_data:/app/data/storage
    networks:
      - supplymind_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ─────────────────────────────────────────────────────────────────────────
  # Celery Beat Scheduler - Production Configuration
  # ─────────────────────────────────────────────────────────────────────────
  celery-beat:
    image: ${WORKER_IMAGE:-supplymind-worker:latest}
    container_name: supplymind-celery-beat-prod
    restart: unless-stopped
    build:
      context: .
      dockerfile: worker/Dockerfile
    command: ["celery", "-A", "worker.celery_app", "beat", "--loglevel=info"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_SERVICE_NAME=supplymind-celery-beat
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - app_data:/app/data/storage
      - reports_data:/app/reports
    networks:
      - supplymind_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ─────────────────────────────────────────────────────────────────────────
  # OpenTelemetry Collector - Production Configuration
  # ─────────────────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: supplymind-otel-collector-prod
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    expose:
      - "4317"
      - "4318"
      - "8889"
    ports:
      - "8889:8889"
    networks:
      - supplymind_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Prometheus - Production Configuration
  # ─────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: supplymind-prometheus-prod
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    expose:
      - "9090"
    networks:
      - supplymind_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Grafana - Production Configuration
  # ─────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: supplymind-grafana-prod
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    expose:
      - "3000"
    networks:
      - supplymind_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Reverse Proxy (Nginx) - Production Configuration
  # ─────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: supplymind-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - supplymind_net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_data:
    driver: local
  reports_data:
    driver: local
  models_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  supplymind_net:
    driver: bridge
