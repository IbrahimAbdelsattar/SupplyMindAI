# ============================================================================
# SupplyMind AI - Slim Production Docker Compose
# ============================================================================
# Reduced from 12 containers to 5 by:
#   - Consolidating 4 Celery workers into 1 service
#   - Embedding Celery Beat in the worker (removes 1 container)
#   - Removing monitoring stack (Prometheus, Grafana, OTel = 3 containers)
#   - Removing reverse proxy (Dokploy handles this)
#
# Before: postgres, redis, backend, frontend, 4 workers, beat, monitoring
# After:  postgres, redis, backend, frontend, 1 consolidated worker
# ============================================================================

services:
  # -------------------------------------------------------------------------
  # 1. PostgreSQL Database
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supplymind_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-supplymind_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supplymind_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - supplymind_net

  # -------------------------------------------------------------------------
  # 2. Redis Cache
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supplymind_net

  # -------------------------------------------------------------------------
  # 3. Backend API
  # -------------------------------------------------------------------------
  backend:
    image: ${BACKEND_IMAGE:-supplymind-backend:latest}
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://supplymind.tech,https://www.supplymind.tech}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:?CLERK_SECRET_KEY is required}
      - CLERK_PUBLISHABLE_KEY=${CLERK_PUBLISHABLE_KEY:-pk_live_Y2xlcmsuc3VwcGx5bWluZC50ZWNoJA}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-deepseek/deepseek-v4-flash:free}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - STORAGE_PATH=/app/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - app_data:/app/data/storage
    networks:
      - supplymind_net
      - dokploy-network

  # -------------------------------------------------------------------------
  # 4. Frontend (Nginx)
  # -------------------------------------------------------------------------
  frontend:
    image: ${FRONTEND_IMAGE:-supplymind-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=/api/v1
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY:?VITE_CLERK_PUBLISHABLE_KEY is required}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - supplymind_net
      - dokploy-network


  # -------------------------------------------------------------------------
  # 5. Consolidated Worker (All Queues + Beat)
  # -------------------------------------------------------------------------
  worker:
    image: ${WORKER_IMAGE:-supplymind-worker:latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    build:
      context: .
      dockerfile: worker/Dockerfile
    # -Q default,ml,rag  -> listens to all three task queues
    command: ["celery", "-A", "worker.celery_app", "worker", "-Q", "default,ml,rag", "--loglevel=info", "--concurrency=2"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      - LLM_MODEL=${LLM_MODEL:-deepseek/deepseek-v4-flash:free}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - STORAGE_PATH=/app/data/storage
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - app_data:/app/data/storage
      - reports_data:/app/reports
      - models_data:/app/models
    networks:
      - supplymind_net

  # -------------------------------------------------------------------------
  # 6. Celery Beat Scheduler
  # -------------------------------------------------------------------------
  beat:
    image: ${WORKER_IMAGE:-supplymind-worker:latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: ["celery", "-A", "worker.celery_app", "beat", "--loglevel=info", "-s", "/data/celerybeat-schedule"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - beat_data:/data
    networks:
      - supplymind_net

# ──────────────────────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_data:
    driver: local
  reports_data:
    driver: local
  models_data:
    driver: local
  beat_data:
    driver: local

networks:
  supplymind_net:
    driver: bridge
  dokploy-network:
    external: true
    name: dokploy