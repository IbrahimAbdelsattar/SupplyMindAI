# ============================================================================
# SupplyMind AI — Frontend Nginx Configuration (Security-Hardened)
# ============================================================================

# Hide Nginx version from response headers
server_tokens off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Body Size Limit (prevent large-payload DoS) ─────────────────────────
    client_max_body_size 10m;

    # ── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 6;

    # ── Security Headers (applied to all responses) ─────────────────────────
    # Clickjacking protection
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Modern XSS protection (CSP replaces legacy X-XSS-Protection)
    add_header X-XSS-Protection "0" always;

    # Control referrer information leakage
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser feature access
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content Security Policy for the React SPA
    # Allows: self, Clerk SDK, Google Fonts, inline styles (needed by React/Tailwind)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://*.clerk.accounts.dev https://clerk.supplymind.tech https://*.clerk.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.clerk.accounts.dev https://clerk.supplymind.tech https://*.clerk.com https://api.supplymind.tech; frame-src https://*.clerk.accounts.dev https://clerk.supplymind.tech https://*.clerk.com; worker-src 'self' blob:;" always;

    # HSTS (enforce HTTPS) — Traefik/Dokploy terminates TLS, but browser
    # should still remember to use HTTPS for future requests
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API Proxy ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;

        # Limit API request body size
        client_max_body_size 5m;
    }

    # ── Health Check ────────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── SPA Fallback ────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Static Asset Caching ────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
