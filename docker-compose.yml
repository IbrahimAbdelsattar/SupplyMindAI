services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: supplymind
      POSTGRES_PASSWORD: password
      POSTGRES_DB: supplymind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplymind"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supplymind_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - supplymind_net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://supplymind:password@postgres:5432/supplymind
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-change-me
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - supplymind_net

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - supplymind_net

volumes:
  postgres_data:

networks:
  supplymind_net:
    driver: bridge
