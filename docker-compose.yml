# SupplyMind AI - Docker Compose
# ==============================================================================

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: supplymind-postgres
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: supplymind
      POSTGRES_PASSWORD: password
      POSTGRES_DB: supplymind
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/00-init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplymind -d supplymind"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: supplymind-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql://supplymind:password@postgres:5432/supplymind
      JWT_SECRET: ${JWT_SECRET:-change-me}
      RAG_API_KEY: ${RAG_API_KEY:-}
      LLM_REASONING_API_KEY: ${LLM_REASONING_API_KEY:-}
      CHATBOT_API_KEY: ${CHATBOT_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-moonshotai/kimi-k2.6:free}
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      STORAGE_PATH: /app/data/storage
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-supplymind-ai}
      MODEL_PATH: /app/Modeling/demand_model_pipeline.pkl
      FORECAST_CSV_PATH: /app/Modeling/future_forecast.csv
      LOG_LEVEL: DEBUG
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./Modeling:/app/Modeling
      - modeling_data:/app/Modeling/persistent
      - data_data:/app/data/persistent
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend (nginx) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: supplymind-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
    driver: local
  modeling_data:
    driver: local
  data_data:
    driver: local
