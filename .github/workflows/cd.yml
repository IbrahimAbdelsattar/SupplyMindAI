name: CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io

jobs:
  push:
    name: Push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        id: string
        run: |
          echo "repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.string.outputs.repo }}/backend
          tags: |
            type=raw,value=${{ github.sha }},priority=200
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.string.outputs.repo }}/frontend
          tags: |
            type=raw,value=${{ github.sha }},priority=200
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || vars.VITE_CLERK_PUBLISHABLE_KEY }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [push]
    if: github.ref == 'refs/heads/main'
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host deploy-host
            HostName ${{ secrets.DEPLOY_HOST }}
            User ${{ secrets.DEPLOY_USER }}
            Port ${{ secrets.DEPLOY_PORT || 22 }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Copy docker-compose and nginx config
        run: |
          mkdir -p deploy
          IMAGE_PREFIX="$(printf '%s' '${{ env.REGISTRY }}/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          cat > deploy/.env <<EOF
          BACKEND_IMAGE=${IMAGE_PREFIX}/backend:${{ github.sha }}
          FRONTEND_IMAGE=${IMAGE_PREFIX}/frontend:${{ github.sha }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          AUTHORIZED_EMAILS=${{ vars.AUTHORIZED_EMAILS }}
          ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}
          ALLOWED_HOSTS=${{ vars.ALLOWED_HOSTS }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          LLM_REASONING_API_KEY=${{ secrets.LLM_REASONING_API_KEY }}
          RAG_API_KEY=${{ secrets.RAG_API_KEY }}
          CHATBOT_API_KEY=${{ secrets.CHATBOT_API_KEY }}
          AGENTROUTER_API_KEY=${{ secrets.AGENTROUTER_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'openrouter' }}
          LLM_MODEL=${{ vars.LLM_MODEL || 'google/gemini-2.5-flash' }}
          ENABLE_COPILOT=${{ vars.ENABLE_COPILOT || 'true' }}
          ENABLE_RAG=${{ vars.ENABLE_RAG || 'true' }}
          ENABLE_AI_INSIGHTS=${{ vars.ENABLE_AI_INSIGHTS || 'true' }}
          ENABLE_FORECAST_INSIGHTS=${{ vars.ENABLE_FORECAST_INSIGHTS || 'true' }}
          EMBEDDING_MODEL=${{ vars.EMBEDDING_MODEL }}
          LANGCHAIN_TRACING_V2=${{ vars.LANGCHAIN_TRACING_V2 }}
          LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_PROJECT=${{ vars.LANGCHAIN_PROJECT }}
          EOF
          ssh deploy-host "mkdir -p ~/supplymind/ssl"
          ssh deploy-host "mkdir -p ~/supplymind/scripts"
          scp docker-compose.prod.yml deploy-host:~/supplymind/docker-compose.yml
          scp nginx.conf deploy-host:~/supplymind/nginx.conf
          scp scripts/init-db.sql deploy-host:~/supplymind/scripts/init-db.sql
          scp deploy/.env deploy-host:~/supplymind/.env

      - name: Deploy via SSH
        run: |
          ssh deploy-host << 'EOF'
            cd ~/supplymind
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose config --quiet
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps
            docker image prune -f
          EOF
