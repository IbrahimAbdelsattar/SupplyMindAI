name: CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # CODE QUALITY & LINTING
  # ────────────────��───────────────────────────────────────────────────────────
  lint-frontend:
    name: Lint & Type Check Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
      - run: npm run lint
        continue-on-error: false
      - run: npm run typecheck
        continue-on-error: false

  lint-backend:
    name: Lint & Format Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - run: pip install flake8 black isort mypy
      - run: black --check backend/
        continue-on-error: true
      - run: isort --check-only backend/
        continue-on-error: true
      - run: flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: false

  # ────────────────────────────────────────────────────────────────────────────
  # TESTS
  # ────────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
      - run: npm run test -- --run
        continue-on-error: false

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - run: pip install -r requirements.txt
      - run: pip install pytest-cov

      - name: Run backend tests
        run: pytest backend/tests/ -v --tb=short --cov=backend --cov-report=xml
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          ENVIRONMENT: test
          JWT_SECRET: test-secret-that-is-long-enough-for-auth-tests
          AUTHORIZED_EMAILS: ""

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ────────────────────────────────────────────────────────────────────────────
  # SECURITY SCANNING
  # ────────────────────────────────────────────────────────────────────────────
  security-frontend:
    name: Security Scan Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
      - run: npm audit --production
        continue-on-error: true

  security-backend:
    name: Security Scan Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install bandit safety
      - run: bandit -r backend/ -v
        continue-on-error: true
      - run: pip check
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  # BUILD
  # ────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [lint-frontend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: /api/v1

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 5

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Python distribution
        run: |
          pip install build wheel
          python -m build
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  # DOCKER BUILD & PUSH
  # ────────────────────────────────────────────────────────────────────────────
  build-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.prod
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}-backend
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile.prod
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}-frontend
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # INTEGRATION TESTS (Docker Compose)
  # ────────────────────────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests (Docker Compose)
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.event_name == 'pull_request'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services
        run: |
          docker-compose -f docker-compose.yml up -d
          sleep 10

      - name: Health check backend
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/api/v1/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Attempt $i - waiting for backend..."
            sleep 2
          done
          echo "Backend failed to start"
          docker-compose logs backend
          exit 1

      - name: Health check frontend
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8080/; then
              echo "Frontend is healthy"
              exit 0
            fi
            echo "Attempt $i - waiting for frontend..."
            sleep 2
          done
          echo "Frontend failed to start"
          docker-compose logs frontend
          exit 1

      - name: Run API tests
        run: |
          # Test key endpoints
          curl -X GET http://localhost:8000/api/v1/health | jq .
          curl -X GET http://localhost:8000/ | jq .

      - name: Cleanup
        if: always()
        run: docker-compose down -v

  # ────────────────────────────────────────────────────────────────────────────
  # ANALYSIS & REPORTING
  # ────────────────────────────────────────────────────────────────────────────
  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-backend, test-frontend, test-backend, security-frontend, security-backend, build-frontend, build-backend]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.lint-frontend.result }}" != "success" ] && [ "${{ needs.lint-frontend.result }}" != "skipped" ]; then
            echo "❌ Frontend linting failed"
            exit 1
          fi
          if [ "${{ needs.lint-backend.result }}" != "success" ] && [ "${{ needs.lint-backend.result }}" != "skipped" ]; then
            echo "❌ Backend linting failed"
            exit 1
          fi
          if [ "${{ needs.test-frontend.result }}" != "success" ] && [ "${{ needs.test-frontend.result }}" != "skipped" ]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi
          if [ "${{ needs.test-backend.result }}" != "success" ] && [ "${{ needs.test-backend.result }}" != "skipped" ]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          echo "✅ All critical checks passed"

  # ────────────────────────────────────────────────────────────────────────────
  # NOTIFICATIONS
  # ────────────────────────────────────────────────────────────────────────────
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [status-check]
    if: failure() && github.event_name == 'push'

    steps:
      - name: Post failure notification
        run: |
          echo "⚠️ CI/CD Pipeline Failed for ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
