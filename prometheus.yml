global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:

scrape_configs:
  - job_name: "otel-collector"
    scrape_interval: 10s
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "backend"
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: "celery-worker"
    scrape_interval: 15s
    static_configs:
      - targets: ["celery-worker:9800"]

  - job_name: "postgres"
    scrape_interval: 15s
    static_configs:
      - targets: ["postgres:9187"]

  - job_name: "redis"
    scrape_interval: 15s
    static_configs:
      - targets: ["redis:9121"]

  - job_name: "prometheus"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:9090"]
